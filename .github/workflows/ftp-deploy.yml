name: Deploy to InfinityFree (FTP)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy files to htdocs
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.IF0_FTP_HOST }}
          username: ${{ secrets.IF0_FTP_USER }}
          password: ${{ secrets.IF0_FTP_PASS }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.cursor/**
            **/README.md
